          value: 0.5
        - time_ms: 0.0
          azimuth_deg: 6.0
          elevation_deg: 0.0
          value: 0.25
        - time_ms: 100.0
          azimuth_deg: 6.0
          elevation_deg: 0.0
          value: 0.75
        - time_ms: 100.0
          azimuth_deg: 14.0
          elevation_deg: 0.0
          value: 0.5
        - time_ms: 200.0
          azimuth_deg: 6.0
          elevation_deg: 0.0
          value: 0.5

  rotating_flow_clockwise_square:
