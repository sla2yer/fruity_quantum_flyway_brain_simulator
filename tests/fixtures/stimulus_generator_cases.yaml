          onset_ms: 0.0
          offset_ms: 1250.0
          angular_velocity_deg_per_s: 90.0
          angular_cycle_count: 2
          phase_deg: 45.0
          waveform: square
          inner_radius_deg: 2.0
          outer_radius_deg: 12.0
    expected:
      shape_t_y_x: [5, 16, 16]
