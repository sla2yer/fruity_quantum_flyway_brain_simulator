dataset:
  datastack_name: flywire_fafb_public
  materialization_version: 783
  flywire_dataset: public

paths:
  codex_raw_dir: data/raw/codex
  classification_csv: data/raw/codex/classification.csv
  # Optional Milestone 7 per-synapse source snapshot. When present, the registry
  # layer writes data/processed/coupling/synapse_registry.csv plus a provenance sidecar.
  # synapse_source_csv: data/raw/codex/synapses.csv
  neuron_registry_csv: data/interim/registry/neuron_registry.csv
  connectivity_registry_csv: data/interim/registry/connectivity_registry.csv
  registry_provenance_json: data/interim/registry/registry_provenance.json
  selected_root_ids: data/interim/root_ids_visual_sample.txt
  subset_output_dir: data/interim/subsets
  meshes_raw_dir: data/interim/meshes_raw
  skeletons_raw_dir: data/interim/skeletons_raw
  processed_mesh_dir: data/processed/meshes
  processed_graph_dir: data/processed/graphs
  processed_coupling_dir: data/processed/coupling
  coupling_inspection_dir: data/processed/coupling_inspection
  manifest_json: data/processed/asset_manifest.json

registry:
  snapshot_version: 783
  project_roles:
    surface_simulated:
      - T4a
      - T5a
    point_simulated:
      - Mi1
      - Tm3
      - Mi4
      - Mi9
      - Tm1
      - Tm2
      - Tm4
      - Tm9
    skeleton_simulated: []

selection:
  active_preset: motion_minimal
  sort_by: root_id
  preview_edge_limit: 20
  presets:
    motion_minimal:
      description: >
        Milestone 2 locked core motion patch centered on T4a/T5a and their direct
        ON/OFF feedforward partners.
      include:
        super_classes:
          - optic
          - visual_projection
        cell_types:
          - T4a
          - T5a
          - Mi1
          - Tm3
          - Mi4
          - Mi9
          - Tm1
          - Tm2
          - Tm4
          - Tm9
      exclude:
        cell_types:
          - R7
          - R8

    motion_medium:
      extends: motion_minimal
      description: >
        Add one-hop local context and direct downstream readout candidates while
        keeping the active motion channel easy to inspect.
      relations:
        - name: direct_motion_inputs
          direction: upstream
          seed:
            cell_types:
              - T4a
              - T5a
          include:
            super_classes:
              - optic
              - visual_projection
            neuropils:
              - ME_R
              - LO_R
          min_syn_count: 5
          max_added: 48
        - name: direct_motion_outputs
          direction: downstream
          seed:
            cell_types:
              - T4a
              - T5a
          include:
            super_classes:
              - optic
              - visual_projection
            neuropils:
              - LOP_R
          min_syn_count: 5
          max_added: 24

    motion_dense:
      extends: motion_medium
      description: >
        Add a denser local halo around the same motion patch for boundary checks,
        ablations, and later promotion decisions.
      relations:
        - name: local_halo_context
          direction: upstream
          seed_from: current
          include:
            super_classes:
              - optic
              - visual_projection
            neuropils:
              - ME_R
              - LO_R
          min_syn_count: 3
          max_added: 96

meshing:
  fetch_skeletons: true
  refetch_meshes: false
  refetch_skeletons: false
  require_skeletons: false
  simplify_target_faces: 15000
  patch_hops: 6
  patch_vertex_cap: 2500
  operator_assembly:
    version: operator_assembly.v1
    boundary_condition:
      mode: closed_surface_zero_flux
    anisotropy:
      model: isotropic
  coupling_assembly:
    version: coupling_assembly.v1
    topology_family: distributed_patch_cloud
    kernel_family: separable_rank_one_cloud
    sign_representation: categorical_sign_with_signed_weight
    delay_representation: nonnegative_delay_ms_per_synapse_or_delay_bin
    delay_model:
      version: coupling_delay_model.v1
      mode: constant_zero_ms
      base_delay_ms: 0.0
      velocity_distance_units_per_ms: 1.0
      delay_bin_size_ms: 0.0
    aggregation_rule: sum_over_synapses_preserving_sign_and_delay_bins
    source_cloud_normalization: sum_to_one_per_component
    target_cloud_normalization: sum_to_one_per_component
  qa_thresholds:
    simplified_component_count_delta:
      warn: null
      fail: 0.0
      blocking: true
    simplified_surface_area_rel_error:
      warn: 0.15
      fail: 0.3
      blocking: true
    simplified_extent_rel_error_max:
      warn: 0.1
      fail: 0.2
      blocking: true
    simplified_centroid_shift_fraction_of_diagonal:
      warn: 0.05
      fail: 0.1
      blocking: false
    simplified_volume_rel_error:
      warn: 0.2
      fail: 0.4
      blocking: false
    coarse_component_count_delta:
      warn: null
      fail: 0.0
      blocking: true
    coarse_surface_vertex_coverage_gap:
      warn: null
      fail: 0.0
      blocking: true
    coarse_max_patch_vertex_fraction:
      warn: 0.6
      fail: 0.8
      blocking: false
    coarse_singleton_patch_fraction:
      warn: 0.25
      fail: 0.5
      blocking: false
