        stimulus_overrides:
          background_level: 0.4
          contrast: 0.25
          onset_ms: 0.0
          offset_ms: 250.0
          spatial_frequency_cpd: 0.1
          temporal_frequency_hz: 2.0
          drift_direction_deg: 0.0
          phase_deg: 90.0
          waveform: sine
          aperture_radius_deg: 10.0
