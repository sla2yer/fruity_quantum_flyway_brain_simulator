          elevation_deg: 0.0
          value: 0.8
        - time_ms: 0.0
          azimuth_deg: 0.0
          elevation_deg: 0.0
          value: 0.5
        - time_ms: 0.0
          azimuth_deg: 3.0
          elevation_deg: 0.0
          value: 0.2
        - time_ms: 100.0
          azimuth_deg: 0.0
          elevation_deg: 0.0
