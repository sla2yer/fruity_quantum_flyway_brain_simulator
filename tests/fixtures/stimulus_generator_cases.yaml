        - time_ms: 0.0
          azimuth_deg: 5.0
          elevation_deg: 0.0
          value: 0.25
        - time_ms: 125.0
          azimuth_deg: 0.0
          elevation_deg: 0.0
          value: 0.5
        - time_ms: 0.0
          azimuth_deg: 12.0
          elevation_deg: 0.0
          value: 0.4

  looming_growth:
    stimulus:
      stimulus:
        stimulus_family: looming
        stimulus_name: simple_looming
        temporal_sampling:
          dt_ms: 50.0
          duration_ms: 250.0
        spatial_frame:
          width_px: 12
          height_px: 12
          width_deg: 24.0
          height_deg: 24.0
        stimulus_overrides:
          background_level: 0.5
          contrast: 0.3
          polarity: negative
          onset_ms: 0.0
          offset_ms: 200.0
          initial_radius_deg: 2.0
          final_radius_deg: 6.0
          edge_softness_deg: 0.0
    expected:
      shape_t_y_x: [5, 12, 12]
      frame_times_ms: [0.0, 50.0, 100.0, 150.0, 200.0]
      family_kind: looming_disc
      samples:
