cases:
  flash_clip_timing:
    stimulus:
      stimulus:
        stimulus_family: flash
        stimulus_name: simple_flash
        temporal_sampling:
          dt_ms: 20.0
          duration_ms: 160.0
        spatial_frame:
          width_px: 16
          height_px: 16
          width_deg: 32.0
          height_deg: 32.0
        stimulus_overrides:
          onset_ms: 40.0
          offset_ms: 120.0
          radius_deg: 6.0
          edge_softness_deg: 0.0
          contrast: 0.7
    expected:
      shape_t_y_x: [8, 16, 16]
      frame_times_ms: [0.0, 20.0, 40.0, 60.0, 80.0, 100.0, 120.0, 140.0]
      family_kind: disc_flash
      samples:
        - time_ms: 20.0
          azimuth_deg: 0.0
          elevation_deg: 0.0
          value: 0.5
        - time_ms: 40.0
          azimuth_deg: 0.0
          elevation_deg: 0.0
          value: 1.0
        - time_ms: 80.0
          azimuth_deg: 8.0
          elevation_deg: 0.0
          value: 0.5
        - time_ms: 120.0
          azimuth_deg: 0.0
          elevation_deg: 0.0
          value: 0.5

  moving_bar_negative_aperture:
    stimulus:
      stimulus:
        stimulus_family: moving_bar
        stimulus_name: simple_moving_bar
        temporal_sampling:
          dt_ms: 20.0
          duration_ms: 120.0
        spatial_frame:
          width_px: 32
          height_px: 16
          width_deg: 32.0
          height_deg: 16.0
        stimulus_overrides:
          background_level: 0.4
          contrast: 0.2
          polarity: negative
          onset_ms: 0.0
          offset_ms: 120.0
          bar_width_deg: 4.0
          direction_deg: 0.0
          velocity_deg_per_s: 20.0
          aperture_radius_deg: 6.0
          edge_softness_deg: 0.0
    expected:
      shape_t_y_x: [6, 16, 32]
      frame_times_ms: [0.0, 20.0, 40.0, 60.0, 80.0, 100.0]
      family_kind: moving_bar
      samples:
        - time_ms: 0.0
          azimuth_deg: 0.0
          elevation_deg: 0.0
          value: 0.3
        - time_ms: 100.0
          azimuth_deg: 2.0
          elevation_deg: 0.0
          value: 0.3
        - time_ms: 100.0
          azimuth_deg: -5.0
          elevation_deg: 0.0
          value: 0.4
        - time_ms: 100.0
          azimuth_deg: 8.0
          elevation_deg: 0.0
          value: 0.4

  translated_edge_ramp:
    stimulus:
      stimulus:
        stimulus_family: translated_edge
        stimulus_name: simple_translated_edge
        temporal_sampling:
          dt_ms: 20.0
          duration_ms: 120.0
        spatial_frame:
          width_px: 32
          height_px: 16
          width_deg: 32.0
          height_deg: 16.0
        stimulus_overrides:
          background_level: 0.2
          contrast: 0.3
          onset_ms: 0.0
          offset_ms: 120.0
          direction_deg: 0.0
          velocity_deg_per_s: 10.0
          edge_width_deg: 4.0
          phase_offset_deg: 0.0
    expected:
      shape_t_y_x: [6, 16, 32]
      frame_times_ms: [0.0, 20.0, 40.0, 60.0, 80.0, 100.0]
      family_kind: translated_edge
      samples:
        - time_ms: 0.0
