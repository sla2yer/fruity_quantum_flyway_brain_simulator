          offset_ms: 200.0
          motion_sign: expansion
          radial_speed_deg_per_s: 20.0
          radial_spatial_frequency_cpd: 0.25
          phase_deg: 90.0
          waveform: square
          inner_radius_deg: 2.0
          outer_radius_deg: 12.0
    expected:
      shape_t_y_x: [5, 16, 16]
      frame_times_ms: [0.0, 50.0, 100.0, 150.0, 200.0]
      family_kind: radial_flow
      samples:
